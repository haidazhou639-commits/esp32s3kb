[build]
target = "xtensa-esp32s3-none-elf"

[target.xtensa-esp32s3-none-elf]
runner = "espflash flash --monitor"
rustflags = [
  "-C", "link-arg=-Tlinkall.x",
  "-C", "link-arg=-Trom_functions.x",
]

[env]
KEYBOARD_TOML_PATH = { value = "keyboard.toml", relative = true }

[unstable]
build-std = ["core", "alloc"]

name: Build Firmware

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust for Xtensa
        uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: "esp32s3"

      - name: Build firmware
        run: cargo build --release

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install espflash
        run: cargo binstall espflash --no-confirm

      - name: Generate flashable binary
        run: espflash save-image --chip esp32s3 target/xtensa-esp32s3-none-elf/release/esp32s3-keyboard keyboard.bin

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-keyboard-firmware
          path: keyboard.bin

[keyboard]
name = "ESP32S3 Keyboard"
product_name = "ESP32S3 Keyboard"
vendor_id = 0x4c4b
product_id = 0x4643
manufacturer = "haobo"
serial_number = "vial:f64c2b3c:000001"
chip = "esp32s3"
usb_enable = true

[matrix]
matrix_type = "normal"
row_pins = ["GPIO1", "GPIO2", "GPIO3", "GPIO4"]
col_pins = ["GPIO5", "GPIO6", "GPIO7", "GPIO8"]
row2col = true

[layout]
rows = 4
cols = 4
layers = 2
keymap = [
    [
        ["Kp7", "Kp8", "Kp9", "Backspace"],
        ["Kp4", "Kp5", "Kp6", "Delete"],
        ["Kp1", "Kp2", "Kp3", "Enter"],
        ["Kp0", "KpDot", "Space", "MO(1)"]
    ],
    [
        ["A", "B", "C", "D"],
        ["E", "F", "MediaPlayPause", "AudioVolUp"],
        ["AudioMute", "AudioVolDown", "MediaNextTrack", "MediaPrevTrack"],
        ["_", "_", "_", "MO(1)"]
    ],
]

[ble]
enabled = true

[storage]
enabled = true
# 0x3d0000 is a standard safe sector offset in 4MB flash for user config data.
start_addr = 0x3d0000
num_sectors = 16
clear_storage = false
